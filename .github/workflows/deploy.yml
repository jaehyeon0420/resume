name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write # gh-pages 브랜치에 쓰기 권한 필요

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 빌드 결과물이 저장되는 폴더명
          branch: gh-pages # 배포될 타겟 브랜치